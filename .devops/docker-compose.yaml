# to run on coolify
services:
  web:
    build:
      context: .
      dockerfile: .devops/Dockerfile
    environment:
      - SERVICE_FQDN_TYPO3_8080
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-64M}
      - PHP_UPLOAD_MAX_FILE_SIZE=${PHP_UPLOAD_MAX_FILE_SIZE:-64M}
      - PHP_DATE_TIMEZONE=${TIMEZONE:-Europe/Berlin}
      - PHP_OPCACHE_ENABLE=1
      - HEALTHCHECK_PATH=${HEALTHCHECK_PATH:-/}
      - TYPO3_CONTEXT=${TYPO3_CONTEXT:-Production}
      - TYPO3_BE_INSTALLTOOLPASSWORD=$TYPO3_BE_INSTALLTOOLPASSWORD
      - TYPO3_DB_CONNECTIONS_DEFAULT_DBNAME=$SERVICE_DATABASE_MARIADB
      - TYPO3_DB_CONNECTIONS_DEFAULT_HOST=mariadb
      - TYPO3_DB_CONNECTIONS_DEFAULT_PASSWORD=$SERVICE_PASSWORD_MARIADB
      - TYPO3_DB_CONNECTIONS_DEFAULT_PORT=3306
      - TYPO3_DB_CONNECTIONS_DEFAULT_USER=$SERVICE_USER_MARIADB
      - TYPO3_MAIL_DEFAULTMAILFROMADDRESS=${TYPO3_MAIL_DEFAULTMAILFROMADDRESS:-noreply@example.com}
      - TYPO3_MAIL_DEFAULTMAILFROMNAME=${TYPO3_MAIL_DEFAULTMAILFROMNAME:-TYPO3 Surfcamp}
      - TYPO3_SYS_ENCRYPTIONKEY=$TYPO3_SYS_ENCRYPTIONKEY
    volumes:
      - typo3-fileadmin:/var/www/html/public/fileadmin
      - typo3-var:/var/www/html/var
    command:
      - /bin/sh
      - -c
      - |
        cd /var/www/html
        bin/typo3 cache:flush
        bin/typo3 language:update
    depends_on:
      - mariadb
    healthcheck:
      test: [ "CMD-SHELL", "curl -f curl --insecure --silent --location --show-error --fail http://localhost:8080$HEALTHCHECK_PATH || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  mariadb:
    image: mariadb:11
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=$SERVICE_PASSWORD_MARIADBROOT
      - MYSQL_DATABASE=$SERVICE_DATABASE_MARIADB
      - MYSQL_USER=$SERVICE_USER_MARIADB
      - MYSQL_PASSWORD=$SERVICE_PASSWORD_MARIADB
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 20s
      retries: 10
  mailpit:
    image: axllent/mailpit
    volumes:
      - "mailpit-data:/data"
      - type: bind
        source: ./htpasswd
        target: /data/htpasswd
        isDirectory: false
        content: ""
    environment:
      - SERVICE_FQDN_MAILPIT_8025
      - MP_MAX_MESSAGES=5000
      - MP_DATABASE=/data/mailpit.db
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
      - MP_UI_AUTH_FILE=/data/htpasswd
    healthcheck:
      test:
        [
          "CMD",
          "/mailpit",
          "readyz",
        ]
      interval: 5s
      timeout: 20s
      retries: 10
